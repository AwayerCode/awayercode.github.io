#!/bin/bash

set -euo pipefail

SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
REPO_DIR="$(cd "$SCRIPT_DIR/.." && pwd)"
SOURCE_DIR="$REPO_DIR/5-Public"
PUBLIC_SITE_REPO_URL="${PUBLIC_SITE_REPO_URL:-https://github.com/AwayerCode/awayercode.github.io.git}"
PUBLIC_SITE_BRANCH="${PUBLIC_SITE_BRANCH:-main}"
PUBLIC_SITE_CONTENT_DIR="${PUBLIC_SITE_CONTENT_DIR:-src/content/posts}"
PUBLIC_SITE_ASSET_DIR="${PUBLIC_SITE_ASSET_DIR:-public/posts}"
COMMIT_MESSAGE="${COMMIT_MESSAGE:-publish: sync 5-Public from private knowledge repo @ $(date '+%Y-%m-%d %H:%M')}"

TMP_DIR="$(mktemp -d)"
TMP_REPO="$TMP_DIR/public-site"

cleanup() {
  rm -rf "$TMP_DIR"
}

fail() {
  echo "Error: $1" >&2
  exit 1
}

extract_frontmatter() {
  local file="$1"
  awk '
    BEGIN { in_block = 0; seen = 0 }
    /^---[[:space:]]*$/ {
      if (seen == 0) {
        in_block = 1
        seen = 1
        next
      }
      if (in_block == 1) {
        exit
      }
    }
    in_block == 1 { print }
  ' "$file"
}

validate_post_dir() {
  local post_dir="$1"
  local slug="$2"
  local markdown_file="$post_dir/index.md"
  local frontmatter
  local cover_value

  [[ -f "$markdown_file" ]] || fail "Post '$slug' must contain index.md"

  frontmatter="$(extract_frontmatter "$markdown_file")"
  [[ -n "$frontmatter" ]] || fail "Post '$slug' is missing a frontmatter block"

  for key in title description date tags cover; do
    echo "$frontmatter" | grep -Eq "^${key}:" || fail "Post '$slug' is missing frontmatter field '${key}'"
  done

  cover_value="$(echo "$frontmatter" | sed -nE "s/^cover:[[:space:]]*[\"']?([^\"']+)[\"']?$/\1/p" | head -n 1)"
  [[ -n "$cover_value" ]] || fail "Post '$slug' must provide a valid cover path"

  if [[ "$cover_value" == ./* || "$cover_value" == ../* ]]; then
    [[ -f "$post_dir/${cover_value#./}" ]] || fail "Post '$slug' cover asset '$cover_value' does not exist"
  fi
}

copy_post_assets() {
  local post_dir="$1"
  local asset_target="$2"

  mkdir -p "$asset_target"
  (
    cd "$post_dir"
    find . -mindepth 1 ! -path './index.md' -print0 | while IFS= read -r -d '' entry; do
      if [[ -d "$entry" ]]; then
        mkdir -p "$asset_target/${entry#./}"
      else
        mkdir -p "$asset_target/$(dirname "${entry#./}")"
        cp "$entry" "$asset_target/${entry#./}"
      fi
    done
  )
}

trap cleanup EXIT

[[ -d "$SOURCE_DIR" ]] || fail "Source directory '$SOURCE_DIR' does not exist"

shopt -s nullglob
post_dirs=("$SOURCE_DIR"/*)
shopt -u nullglob

post_count=0
for path in "${post_dirs[@]}"; do
  [[ -d "$path" ]] && ((post_count+=1))
done

(( post_count > 0 )) || fail "Source directory '$SOURCE_DIR' is empty"

git clone --depth 1 --branch "$PUBLIC_SITE_BRANCH" "$PUBLIC_SITE_REPO_URL" "$TMP_REPO"

[[ -d "$TMP_REPO/$PUBLIC_SITE_CONTENT_DIR" ]] || fail "Public repo content directory '$PUBLIC_SITE_CONTENT_DIR' not found"

mkdir -p "$TMP_REPO/$PUBLIC_SITE_ASSET_DIR"
find "$TMP_REPO/$PUBLIC_SITE_CONTENT_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
find "$TMP_REPO/$PUBLIC_SITE_ASSET_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

for post_dir in "${post_dirs[@]}"; do
  [[ -d "$post_dir" ]] || continue

  slug="$(basename "$post_dir")"
  validate_post_dir "$post_dir" "$slug"

  mkdir -p "$TMP_REPO/$PUBLIC_SITE_CONTENT_DIR/$slug"
  cp -R "$post_dir/"* "$TMP_REPO/$PUBLIC_SITE_CONTENT_DIR/$slug/"
  copy_post_assets "$post_dir" "$TMP_REPO/$PUBLIC_SITE_ASSET_DIR/$slug"
done

cd "$TMP_REPO"

if [[ -z "$(git status --porcelain)" ]]; then
  echo "No public-site changes to publish."
  exit 0
fi

git add "$PUBLIC_SITE_CONTENT_DIR" "$PUBLIC_SITE_ASSET_DIR"
git commit -m "$COMMIT_MESSAGE"
git push origin "$PUBLIC_SITE_BRANCH"

echo "Published public content to $PUBLIC_SITE_REPO_URL ($PUBLIC_SITE_BRANCH)."
